<html lang="zh-CN"><head><meta charset="utf-8">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;}
.container{max-width:1400px;margin:0 auto;padding:20px;}
h1{color:#f0f6fc;margin-bottom:4px;}
h2{color:#f0f6fc;margin:30px 0 12px;font-size:1.2em;}
.subtitle{color:#8b949e;margin-bottom:20px;}
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:30px;}
.stat-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center;}
.stat-num{font-size:2em;color:#58a6ff;font-weight:700;}
.stat-label{color:#8b949e;font-size:.85em;margin-top:4px;}
.stat-pct{color:#3fb950;font-size:.9em;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:16px;}
table{width:100%;border-collapse:collapse;font-size:.85em;}
th{background:#161b22;color:#8b949e;text-align:left;padding:8px;border-bottom:1px solid #30363d;position:sticky;top:0;}
td{padding:6px 8px;border-bottom:1px solid #21262d;}
tr:hover{background:#161b22;}
.type-cart{color:#d29922;}
.type-checkout{color:#f0883e;}
.type-purchased{color:#3fb950;font-weight:600;}
.ref-cell{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mini-table td,.mini-table th{padding:4px 8px;}
.search{margin:12px 0;}
.search input{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:8px 12px;border-radius:6px;width:300px;}
footer{margin-top:30px;padding:16px;border-top:1px solid #30363d;color:#8b949e;font-size:.85em;text-align:center;}
</style>
</head><body>
<nav class="top-nav">

<div class="container">
<h1>事件报告</h1>
<p class="subtitle">共 0 个事件 | 备份于 2026-04-06 15:12</p>

<div class="stats-grid">
  <div class="stat-card"><div class="stat-num">--</div><div class="stat-label">产品浏览</div></div>
  <div class="stat-card"><div class="stat-num">--</div><div class="stat-label">加入购物车</div></div>
  <div class="stat-card"><div class="stat-num">--</div><div class="stat-label">到达结账</div></div>
  <div class="stat-card"><div class="stat-num">--</div><div class="stat-label">已购买</div></div>
  <div class="stat-card"><div class="stat-num">--</div><div class="stat-label">转化率</div></div>
</div>

<div class="grid-3">
  <div class="card"><h2>热门产品</h2><table class="mini-table"><tr><th>产品 ID</th><th>事件数</th></tr>
  </table></div>
  <div class="card"><h2>浏览器</h2><table class="mini-table"><tr><th>浏览器</th><th>数量</th></tr>
  </table></div>
  <div class="card"><h2>操作系统</h2><table class="mini-table"><tr><th>操作系统</th><th>数量</th></tr>
  </table></div>
</div>

<div class="grid-3">
  <div class="card"><h2>设备类型</h2><table class="mini-table"><tr><th>设备</th><th>数量</th></tr>
  </table></div>
  <div class="card"><h2>国家/地区</h2><table class="mini-table"><tr><th>国家/地区</th><th>数量</th></tr>
  </table></div>

  </table></div>

<h2>全部事件 (0)</h2>
<div class="search"><input type="text" id="searchBox" placeholder="筛选事件..." oninput="filterTable()"></div>
<div style="overflow-x:auto;">
<table id="eventsTable">
<thead><tr><th>事件 ID</th><th>类型</th><th>创建时间</th><th>产品</th><th>来源</th><th>浏览器</th><th>操作系统</th><th>设备</th><th>国家/地区</th></tr></thead>
<tbody>

</tbody>
</table>

<script>
function filterTable(){
  var q=document.getElementById('searchBox').value.toLowerCase();
  var rows=document.querySelectorAll('#eventsTable tbody tr');
  rows.forEach(function(r){r.style.display=r.innerText.toLowerCase().includes(q)?'':'none';});
}
</script>
