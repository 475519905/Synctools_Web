<body data-theme="light">

  <script type="text/babel" src="parts/SubShared.jsx"></script>
  <script type="text/babel">
function DownloadPage() {
  const platforms = [
    {

      specs: ['独立安装包（.exe）', '自动检测并安装依赖', '与 C4D / Blender 等插件同步'],
      icon: (
        <svg viewBox="0 0 24 24" fill="none" style={{width:32,height:32}}>
          <path d="M3 12l9-8v6h9v4h-9v6l-9-8z" fill="var(--accent)" opacity="0.8"/>
          <rect x="1" y="5" width="10" height="7" fill="var(--accent)"/>
          <rect x="1" y="13" width="10" height="7" fill="var(--accent)" opacity="0.7"/>

          <rect x="12" y="12.5" width="11" height="5.5" fill="var(--accent)" opacity="0.6"/>
        </svg>
      ),
      primary: true,
    },
    {
      name: 'macOS',
      desc: '支持 macOS 12+（Monterey 及以上），Apple Silicon 与 Intel 双架构。',
      specs: ['通用应用（Universal .dmg）', '系统签名与隔离权限适配', '与 C4D / Blender 等插件同步'],
      icon: (
        <svg viewBox="0 0 24 24" fill="none" style={{width:32,height:32}}>
          <path d="M18.7 8.2c-1 .6-1.7 1.7-1.6 2.8 1.2.1 2.3-.7 2.9-1.5.5-.7.9-1.7.8-2.7-1.1 0-2.1.6-2.1 1.4z" fill="var(--fg)"/>

        </svg>
      ),
    },
    {
      name: 'Linux',
      desc: '支持主流发行版（Ubuntu 20.04+ / CentOS 7+ / Rocky 等），提供 AppImage。',
      specs: ['一体化 AppImage', '无需系统级安装', '与 C4D / Blender 等插件同步'],
      icon: (
        <svg viewBox="0 0 24 24" fill="none" style={{width:32,height:32}}>
          <circle cx="12" cy="10" r="6" fill="var(--fg)" opacity="0.15"/>
          <circle cx="10" cy="9" r="1" fill="var(--fg)"/>
          <circle cx="14" cy="9" r="1" fill="var(--fg)"/>
          <path d="M9.5 12c0 0 1 2 2.5 2s2.5-2 2.5-2" stroke="var(--fg)" strokeWidth="1.2" fill="none"/>

  return (
    <>

      <section className="page-hero">

      </section>

      <section style={{ paddingBottom: 80 }}>
        <div className="wrap">
          <div className="dl-grid">
            {platforms.map((p, i) => (
              <div className="dl-card" key={i}>
                <div className="platform">
                  <span className="icon">{p.icon}</span>

                <p className="desc cn">{p.desc}</p>
                <div className="specs">
                  {p.specs.map((s, j) => <div className="spec cn" key={j}>{s}</div>)}
                </div>
                <a className={`${p.primary ? 'btn btn-accent' : 'btn btn-ghost'} card-btn`} href="#" style={{ textAlign: 'center' }}>

            <h3 className="cn">获取旧版本与增量包</h3>
            <p className="cn">若您需要历史版本、离线安装包或校验文件（SHA256），请访问归档下载页面。</p>

ReactDOM.createRoot(document.getElementById('root')).render(<DownloadPage />);
  </script>
</body>
</html>
